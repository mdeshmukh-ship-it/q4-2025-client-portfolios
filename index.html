async function decrypt(){const password=document.getElementById('passwordInput').value;if(!password)return;const errorEl=document.getElementById('errorMsg'),loadingEl=document.getElementById('loadingMsg');errorEl.style.display='none';loadingEl.style.display='block';try{const raw=Uint8Array.from(atob(ENCRYPTED_DATA),c=>c.charCodeAt(0));const salt=raw.slice(0,16),iv=raw.slice(16,28),tag=raw.slice(28,44),ct=raw.slice(44);const pk=await crypto.subtle.importKey('raw',new TextEncoder().encode(password),'PBKDF2',false,['deriveKey']);const ak=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITERATIONS,hash:'SHA-256'},pk,{name:'AES-GCM',length:256},false,['decrypt']);const dwt=new Uint8Array(ct.length+tag.length);dwt.set(ct);dwt.set(tag,ct.length);const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},ak,dwt);document.open();document.write(new TextDecoder().decode(dec));document.close();}catch(e){loadingEl.style.display='none';errorEl.style.display='block';document.getElementById('passwordInput').select();}}
