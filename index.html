<title>Q4 2025 Client Portfolios - Perennial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0F1923;
    color: #E0E6ED;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-container {
    background: #1B2A4A;
    border-radius: 16px;
    padding: 48px;
    width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align: center;
  }
  .logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #3A5BA0, #5B8DEF);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-size: 28px; font-weight: 700; color: white;
  }
  h1 {
    font-size: 22px; font-weight: 700; color: white;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 13px; color: #7B8FA3;
    margin-bottom: 32px;
  }
  .input-group {
    position: relative;
    margin-bottom: 20px;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px 18px;
    background: #0F1923;
    border: 2px solid #2A3F5F;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus {
    border-color: #5B8DEF;
  }
  input[type="password"]::placeholder {
    color: #4A5F7A;
  }
  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #3A5BA0, #5B8DEF);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(91,141,239,0.4);
  }
  button:active {
    transform: translateY(0);
  }
  .error {
    color: #FF6B6B;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .loading {
    display: none;
    color: #7B8FA3;
    font-size: 13px;
    margin-top: 12px;
  }
  .lock-icon {
    font-size: 32px;
    margin-bottom: 8px;
  }
  .footer {
    margin-top: 24px;
    font-size: 11px;
    color: #4A5F7A;
  }
</style>
</head>
<body>

<div class="login-container" id="loginForm">
  <div class="logo">P</div>
  <h1>Perennial Wealth Management</h1>
  <div class="subtitle">Q4 2025 Client Portfolio Dashboard</div>
  
  <div class="input-group">
    <input type="password" id="passwordInput" placeholder="Enter password" autofocus

  </div>
  
  <button onclick="decrypt()">Unlock Dashboard</button>
  
  <div class="error" id="errorMsg">Incorrect password. Please try again.</div>
  <div class="loading" id="loadingMsg">Decrypting...</div>
  
  <div class="footer">AES-256-GCM encrypted &bull; Client-side decryption only</div>
</div>

const ITERATIONS = 100000;

async function decrypt() {
  const password = document.getElementById('passwordInput').value;
  if (!password) return;
  
  const errorEl = document.getElementById('errorMsg');
  const loadingEl = document.getElementById('loadingMsg');
  errorEl.style.display = 'none';
  loadingEl.style.display = 'block';
  
  try {
    // Decode base64
    const raw = Uint8Array.from(atob(ENCRYPTED_DATA), c => c.charCodeAt(0));
    
    // Extract components: salt(16) + iv(12) + tag(16) + ciphertext
    const salt = raw.slice(0, 16);
    const iv = raw.slice(16, 28);
    const tag = raw.slice(28, 44);
    const ciphertext = raw.slice(44);
    
    // Derive key using PBKDF2
    const passwordKey = await crypto.subtle.importKey(
      'raw',
      new TextEncoder().encode(password),
      'PBKDF2',
      false,
      ['deriveKey']
    );
    
    const aesKey = await crypto.subtle.deriveKey(
      {
        name: 'PBKDF2',
        salt: salt,
        iterations: ITERATIONS,
        hash: 'SHA-256'
      },
      passwordKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    
    // Combine ciphertext + tag for Web Crypto (it expects them concatenated)
    const dataWithTag = new Uint8Array(ciphertext.length + tag.length);
    dataWithTag.set(ciphertext);
    dataWithTag.set(tag, ciphertext.length);
    
    // Decrypt
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      aesKey,
      dataWithTag
    );
    
    // Success - replace entire page with decrypted HTML
    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
    
  } catch (e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    document.getElementById('passwordInput').select();
  }
}
