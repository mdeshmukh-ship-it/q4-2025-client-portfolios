const ITERATIONS=100000;
async function decrypt(){
const password=document.getElementById('passwordInput').value;
if(!password)return;
const errorEl=document.getElementById('errorMsg'),loadingEl=document.getElementById('loadingMsg');
errorEl.style.display='none';loadingEl.style.display='block';
try{
const raw=Uint8Array.from(atob(ENCRYPTED_DATA),c=>c.charCodeAt(0));
const salt=raw.slice(0,16),iv=raw.slice(16,28),tag=raw.slice(28,44),ct=raw.slice(44);
